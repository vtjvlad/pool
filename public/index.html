<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Billiards Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="play-area">
            <canvas id="billiard-canvas"></canvas>
            <div id="shot-controls">
                <span class="control-label">Сила удара</span>
                <p id="pull-hint">Оттяните вниз и отпустите</p>
                <div id="power-pull-track">
                    <div id="power-pull-fill"></div>
                    <div id="power-pull-thumb"></div>
                </div>
                <span id="power-value">0%</span>
            </div>
        </div>
        <div id="ui">
            <p>Score: <span id="score">0</span></p>
            <p id="hint">Стол — прицел. Справа — оттяните ползунок и отпустите для удара</p>
            <button id="reset-btn" type="button">Reset Game</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
