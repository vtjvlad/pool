<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Billiards Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="play-area">
            <canvas id="billiard-canvas"></canvas>
            <div id="shot-controls">
                <span class="control-label">Сила удара</span>
                <div id="power-slider-wrap">
                    <input type="range" id="power-slider" min="0" max="100" value="0" orient="vertical">
                </div>
                <span id="power-value">0%</span>
                <button id="strike-btn" type="button">Удар</button>
            </div>
        </div>
        <div id="ui">
            <p>Score: <span id="score">0</span></p>
            <p id="hint">Коснитесь стола — прицел в эту точку. Справа — сила и кнопка «Удар»</p>
            <button id="reset-btn" type="button">Reset Game</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
